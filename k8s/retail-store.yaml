        app: catalog
    spec:
      containers:
        - name: catalog
          image: public.ecr.aws/aws-containers/retail-store-sample-catalog:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_ENDPOINT
              value: "project-bedrock-mysql.c0p4guk0ausy.us-east-1.rds.amazonaws.com"
            - name: DB_USER
              value: "bedrockadmin"
            - name: DB_PASSWORD
              value: "BedrockMySQL2025!"
            - name: DB_NAME
              value: "retailstore"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
